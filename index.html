<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zarządzanie Koncertami</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Zarządzanie Koncertami</h1>

    <div class="card mb-4 border-primary">
    <div class="card-header bg-primary text-white">Dodaj Nowy Koncert</div>
    <div class="card-body">
        <form action="/dodaj" method="POST" class="row g-3">
            <div class="col-md-6">
                <input type="text" name="name" class="form-control" placeholder="Nazwa koncertu" required>
            </div>
            <div class="col-md-6">
                <input type="number" name="venue_id" class="form-control" placeholder="ID Lokalizacji (np. 1)" required>
            </div>
            <div class="col-md-6">
                <label class="form-label small">Data rozpoczęcia</label>
                <input type="datetime-local" name="date_start" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label small">Data zakończenia</label>
                <input type="datetime-local" name="date_end" class="form-control">
            </div>
            <div class="col-12">
                <textarea name="description" class="form-control" placeholder="Opis wydarzenia"></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Dodaj Wydarzenie</button>
            </div>
        </form>
    </div>
</div>

<table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>Koncert</th>
            <th>Rozpoczęcie</th>
            <th>Zakończenie</th>
            <th>Opis</th>
            <th>Usuwanie</th>
        </tr>
    </thead>
    <tbody>
        {% for e in wydarzenia %}
        <tr>
            <td>{{ e.name }}</td>
            <td>{{ e.date_start }}</td>
            <td>{{ e.date_end if e.date_end else 'Brak' }}</td>
            <td><small>{{ e.description }}</small></td>
            <td>
                <a href="/usun/{{ e.id }}" class="btn btn-danger btn-sm">Usuń</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
